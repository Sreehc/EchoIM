name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image owner
        id: image_vars
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ env.REGISTRY }}/$owner/echoim-frontend" >> "$GITHUB_OUTPUT"
          echo "backend_image=${{ env.REGISTRY }}/$owner/echoim-backend" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ steps.image_vars.outputs.frontend_image }}:latest
            ${{ steps.image_vars.outputs.frontend_image }}:sha-${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend/echoim-server
          file: backend/echoim-server/Dockerfile
          push: true
          tags: |
            ${{ steps.image_vars.outputs.backend_image }}:latest
            ${{ steps.image_vars.outputs.backend_image }}:sha-${{ github.sha }}

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Package deploy assets
        run: tar -czf deploy-assets.tar.gz deploy

      - name: Upload deploy assets
        run: |
          scp -P "${{ secrets.SSH_PORT }}" deploy-assets.tar.gz \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/echoim-deploy-assets.tar.gz"

      - name: Deploy on server
        env:
          FRONTEND_IMAGE: ${{ steps.image_vars.outputs.frontend_image }}:sha-${{ github.sha }}
          BACKEND_IMAGE: ${{ steps.image_vars.outputs.backend_image }}:sha-${{ github.sha }}
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            set -euo pipefail
            APP_ROOT=/srv/echoim
            APP_DIR=\$APP_ROOT/app/current
            ENV_DIR=\$APP_ROOT/env
            SCRIPT_DIR=\$APP_ROOT/scripts
            mkdir -p \$APP_DIR \$ENV_DIR \$SCRIPT_DIR
            tar -xzf /tmp/echoim-deploy-assets.tar.gz -C \$APP_DIR
            install -m 755 \$APP_DIR/deploy/scripts/deploy.sh \$SCRIPT_DIR/deploy.sh
            install -m 755 \$APP_DIR/deploy/scripts/server-deploy.sh \$SCRIPT_DIR/server-deploy.sh
            cat > \$ENV_DIR/release.env <<EOF
            FRONTEND_IMAGE=$FRONTEND_IMAGE
            BACKEND_IMAGE=$BACKEND_IMAGE
            EOF
            \$SCRIPT_DIR/deploy.sh
          "
