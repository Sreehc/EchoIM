name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/echoim-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run backend tests
        run: mvn -B test

  frontend-web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/echoim-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/echoim-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build web app
        run: npm run build

  frontend-admin-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/echoim-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/echoim-admin/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build admin app
        run: npm run build

  frontend-typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - frontend/echoim-web
          - frontend/echoim-admin
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run typecheck
        run: npm run typecheck
