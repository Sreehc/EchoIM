echoim:
  jwt:
    secret: ${ECHOIM_JWT_SECRET:your-jwt-secret}
  file:
    storage-type: oss
    max-size: 104857600
    signed-url-expire-seconds: 600
    allowed-image-content-types: image/jpeg,image/png,image/gif,image/webp
    allowed-image-extensions: jpg,jpeg,png,gif,webp
    allowed-file-content-types: application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation,text/plain,application/zip,application/x-zip-compressed
    allowed-file-extensions: pdf,doc,docx,xls,xlsx,ppt,pptx,txt,zip
    oss:
      endpoint: ${ECHOIM_OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
      bucket-name: ${ALIYUN_OSS_BUCKET:your-bucket-name}
      access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:your-access-key-id}
      access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:your-access-key-secret}
      object-prefix: echoim
