spring:
  application:
    name: echoim-server
  profiles:
    default: local
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:echoim}?useUnicode=true&characterEncoding=utf8mb4&connectionCollation=utf8mb4_general_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: ${ECHOIM_MULTIPART_MAX_FILE_SIZE:100MB}
      max-request-size: ${ECHOIM_MULTIPART_MAX_FILE_SIZE:100MB}
    encoding:
      charset: UTF-8
      enabled: true
      force: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

echoim:
  jwt:
    secret: ${ECHOIM_JWT_SECRET:}
    expire-seconds: 7200
  auth:
    mail-from: ${SPRING_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
    code-expire-seconds: ${ECHOIM_AUTH_CODE_EXPIRE_SECONDS:600}
    resend-cooldown-seconds: ${ECHOIM_AUTH_RESEND_COOLDOWN_SECONDS:60}
    max-verify-attempts: ${ECHOIM_AUTH_MAX_VERIFY_ATTEMPTS:5}
    trusted-device-expire-days: ${ECHOIM_AUTH_TRUSTED_DEVICE_EXPIRE_DAYS:30}
    refresh-token-expire-days: ${ECHOIM_AUTH_REFRESH_TOKEN_EXPIRE_DAYS:30}
  file:
    storage-type: ${ECHOIM_FILE_STORAGE_TYPE:oss}
    base-url: ${ECHOIM_FILE_BASE_URL:}
    access-sign-secret: ${ECHOIM_FILE_ACCESS_SIGN_SECRET:echoim-file-access-secret}
    max-size: ${ECHOIM_FILE_MAX_SIZE:104857600}
    signed-url-expire-seconds: ${ECHOIM_FILE_SIGNED_URL_EXPIRE_SECONDS:600}
    allowed-image-content-types: ${ECHOIM_FILE_ALLOWED_IMAGE_CONTENT_TYPES:image/jpeg,image/png,image/gif,image/webp}
    allowed-image-extensions: ${ECHOIM_FILE_ALLOWED_IMAGE_EXTENSIONS:jpg,jpeg,png,gif,webp}
    allowed-file-content-types: ${ECHOIM_FILE_ALLOWED_FILE_CONTENT_TYPES:application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation,text/plain,application/zip,application/x-zip-compressed}
    allowed-file-extensions: ${ECHOIM_FILE_ALLOWED_FILE_EXTENSIONS:pdf,doc,docx,xls,xlsx,ppt,pptx,txt,zip}
    local:
      root-dir: ${ECHOIM_FILE_LOCAL_ROOT_DIR:./data/echoim-files}
  im:
    port: ${ECHOIM_IM_PORT:8091}
    ws-path: /ws
    heartbeat-timeout-seconds: 60
  call:
    ring-timeout-seconds: ${ECHOIM_CALL_RING_TIMEOUT_SECONDS:30}
    ice-servers:
      - urls:
          - ${ECHOIM_CALL_STUN_URL:stun:stun.l.google.com:19302}
